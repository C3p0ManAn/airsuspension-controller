<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSuspension Controller</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="status-indicator">
        <span id="ble-status-dot" class="dot disconnected"></span>
        <span id="ble-status-text">DISCONNECTED</span>
      </div>
      <button id="connect-btn" class="cyber-btn connect-btn">CONNECT BLE</button>
    </header>

    <main class="controller-board">
      <svg viewBox="0 0 360 500" class="controller-svg">
        <defs>
          <linearGradient id="btn-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.08)" />
            <stop offset="100%" stop-color="rgba(0,0,0,0.6)" />
          </linearGradient>
          <linearGradient id="btn-grad-hover" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(0,243,255,0.2)" />
            <stop offset="100%" stop-color="rgba(0,0,0,0.6)" />
          </linearGradient>
        </defs>

        <!-- BTN I (Top Left) -->
        <g class="btn-group control-btn" data-action="A">
          <polygon points="0,0 80,0 120,200 120,260 0,260" class="poly-shape" />
          <text x="50" y="100" text-anchor="middle" dominant-baseline="middle" class="poly-text">I</text>
        </g>
        
        <!-- BTN II (Top Right) -->
        <g class="btn-group control-btn" data-action="B">
          <polygon points="280,0 360,0 360,260 240,260 240,200" class="poly-shape" />
          <text x="310" y="100" text-anchor="middle" dominant-baseline="middle" class="poly-text">II</text>
        </g>
        
        <!-- BTN III (Bottom Left) -->
        <g class="btn-group control-btn" data-action="C">
          <polygon points="0,260 120,260 180,320 80,500 0,500" class="poly-shape" />
          <text x="50" y="400" text-anchor="middle" dominant-baseline="middle" class="poly-text">III</text>
        </g>
        
        <!-- BTN IV (Bottom Right) -->
        <g class="btn-group control-btn" data-action="D">
          <polygon points="240,260 360,260 360,500 280,500 180,320" class="poly-shape" />
          <text x="310" y="400" text-anchor="middle" dominant-baseline="middle" class="poly-text">IV</text>
        </g>

        <!-- UP Arrow -->
        <g class="btn-group control-btn" data-action="M">
          <polygon points="80,0 280,0 240,200 120,200" class="poly-shape" />
          <g transform="translate(156, 70) scale(2)">
            <path class="poly-icon" d="M12 4l-8 8h16z"/><path class="poly-icon" d="M12 10l-8 8h16z"/>
          </g>
        </g>

        <!-- DOWN Arrow -->
        <g class="btn-group control-btn" data-action="N">
          <polygon points="80,500 280,500 180,320" class="poly-shape" />
          <g transform="translate(156, 400) scale(2)">
            <path class="poly-icon" d="M12 20l8-8H4z"/><path class="poly-icon" d="M12 14l8-8H4z"/>
          </g>
        </g>

        <!-- SYNDICATE Center -->
        <g class="btn-group syndicate-group control-btn" data-action="4">
          <polygon points="120,200 240,200 240,260 180,320 120,260" class="poly-shape syndicate-shape" />
          <text x="180" y="235" text-anchor="middle" dominant-baseline="middle" class="poly-text syndicate-text">SYNDICATE</text>
        </g>

      </svg>
    </main>

    <div class="presets">
      <button class="cyber-btn preset-btn control-btn" data-action="1">PRESET 1</button>
      <button class="cyber-btn preset-btn control-btn" data-action="2">PRESET 2</button>
      <button class="cyber-btn preset-btn control-btn" data-action="3">PRESET 3</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
