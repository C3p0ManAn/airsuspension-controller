<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSuspension Controller</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="status-indicator">
        <span id="ble-status-dot" class="dot disconnected"></span>
        <span id="ble-status-text">DISCONNECTED</span>
      </div>
      <button id="connect-btn" class="cyber-btn connect-btn">CONNECT BLE</button>
    </header>

    <main class="controller-board">
      <button class="cyber-btn corner-btn btn-i" data-action="BTN_1">I</button>
      <button class="cyber-btn arrow-btn btn-up" data-action="ALL_UP">
        <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h16z"/><path d="M12 10l-8 8h16z"/></svg>
      </button>
      <button class="cyber-btn corner-btn btn-ii" data-action="BTN_2">II</button>

      <div class="center-wrapper">
        <button class="cyber-btn syndicate-btn" data-action="SYNDICATE">SYNDICATE</button>
      </div>

      <button class="cyber-btn corner-btn btn-iii" data-action="BTN_3">III</button>
      <button class="cyber-btn arrow-btn btn-down" data-action="ALL_DN">
        <svg viewBox="0 0 24 24"><path d="M12 20l8-8H4z"/><path d="M12 14l8-8H4z"/></svg>
      </button>
      <button class="cyber-btn corner-btn btn-iv" data-action="BTN_4">IV</button>
    </main>

    <div class="presets">
      <button class="cyber-btn preset-btn" data-action="PRESET_1">PRESET 1</button>
      <button class="cyber-btn preset-btn" data-action="PRESET_2">PRESET 2</button>
      <button class="cyber-btn preset-btn" data-action="PRESET_3">PRESET 3</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
