<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CyberSuspension App</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Dynamic Ambient Edge Lighting Engine -->
  <div class="ambient-light"></div>

  <div class="app-container">
    <header class="header">
      <button id="settings-btn" style="background:transparent; border:none; color:var(--neon-white); font-size:1.5rem; cursor:pointer; filter:drop-shadow(0 0 5px rgba(255,255,255,0.5));">⚙</button>
      <div class="status-indicator">
        <span id="ble-status-dot" class="dot disconnected"></span>
        <span id="ble-status-text">DISCONNECTED</span>
      </div>
      <button id="connect-btn" class="cyber-btn connect-btn">CONNECT BLE</button>
    </header>

    <!-- Clean, Hexagonal Wheel Grid -->
    <main class="control-grid">
      <!-- Top Left (Front Left) -->
      <div class="corner fl">
        <button class="hex-btn corner-up control-btn" data-action="A"><span class="icon">▲</span></button>
        <div class="corner-label">FL</div>
        <button class="hex-btn corner-down control-btn" data-action="E"><span class="icon">▼</span></button>
      </div>
      
      <!-- Top Right (Front Right) -->
      <div class="corner fr">
        <button class="hex-btn corner-up control-btn" data-action="B"><span class="icon">▲</span></button>
        <div class="corner-label">FR</div>
        <button class="hex-btn corner-down control-btn" data-action="F"><span class="icon">▼</span></button>
      </div>

      <!-- Center Control Column -->
      <div class="center-col">
        <button class="hex-btn all-up control-btn" data-action="M"><span class="icon">▲▲</span></button>
        <button class="hex-btn syndicate control-btn" data-action="4">
          <span class="syn-title">SYNDICATE</span>
        </button>
        <button class="hex-btn all-down control-btn" data-action="N"><span class="icon">▼▼</span></button>
      </div>

      <!-- Bottom Left (Rear Left) -->
      <div class="corner rl">
        <button class="hex-btn corner-up control-btn" data-action="C"><span class="icon">▲</span></button>
        <div class="corner-label">RL</div>
        <button class="hex-btn corner-down control-btn" data-action="G"><span class="icon">▼</span></button>
      </div>

      <!-- Bottom Right (Rear Right) -->
      <div class="corner rr">
        <button class="hex-btn corner-up control-btn" data-action="D"><span class="icon">▲</span></button>
        <div class="corner-label">RR</div>
        <button class="hex-btn corner-down control-btn" data-action="H"><span class="icon">▼</span></button>
      </div>
    </main>

    <div class="presets">
      <button class="preset-btn control-btn" data-action="1">MODE 1</button>
      <button class="preset-btn control-btn" data-action="2">MODE 2</button>
      <button class="preset-btn control-btn" data-action="3">MODE 3</button>
      <button id="gyro-btn" class="preset-btn control-btn">GYRO</button>
    </div>
  </div>

  <!-- Passcode Modal -->
  <div id="passcode-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 style="color:var(--neon-red); margin-bottom: 20px; font-family:var(--font-heading);">PASSCODE</h2>
      <input type="password" id="passcode-input" maxlength="4" placeholder="••••">
      <button id="passcode-submit" class="connect-btn" style="margin-top:20px; width:100%;">UNLOCK</button>
      <button id="passcode-cancel" class="connect-btn" style="margin-top:10px; width:100%; border-color:#555; color:#aaa;">CANCEL</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h2 style="color:var(--neon-white); margin-bottom: 20px; font-family:var(--font-heading);">SYSTEM SETUP</h2>
      
      <div class="setting-group">
        <label>Gyro Deadzone: <span id="deadzone-val">15</span>°</label>
        <input type="range" id="deadzone-slider" min="5" max="45" value="15">
      </div>
      
      <div class="setting-group">
        <label>Mode 1 Delay: <span id="delay-val">200</span>ms</label>
        <input type="range" id="delay-slider" min="50" max="800" step="10" value="200">
      </div>
      
      <button id="settings-close" class="connect-btn" style="margin-top:25px; width:100%;">SAVE & CLOSE</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
