<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSuspension Controller</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="status-indicator">
        <span id="ble-status-dot" class="dot disconnected"></span>
        <span id="ble-status-text">DISCONNECTED</span>
      </div>
      <button id="connect-btn" class="cyber-btn connect-btn">CONNECT BLE</button>
    </header>

    <main class="controller-board">
      
      <div class="poly-btn btn-i control-btn" data-action="BTN_1">
        <span>I</span>
      </div>
      
      <div class="poly-btn btn-up control-btn" data-action="ALL_UP">
        <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h16z"/><path d="M12 10l-8 8h16z"/></svg>
      </div>
      
      <div class="poly-btn btn-ii control-btn" data-action="BTN_2">
        <span>II</span>
      </div>

      <div class="poly-btn syndicate-btn control-btn" data-action="SYNDICATE">
        <span>SYNDICATE</span>
      </div>

      <div class="poly-btn btn-iii control-btn" data-action="BTN_3">
        <span>III</span>
      </div>
      
      <div class="poly-btn btn-down control-btn" data-action="ALL_DN">
        <svg viewBox="0 0 24 24"><path d="M12 20l8-8H4z"/><path d="M12 14l8-8H4z"/></svg>
      </div>
      
      <div class="poly-btn btn-iv control-btn" data-action="BTN_4">
        <span>IV</span>
      </div>

    </main>

    <div class="presets">
      <button class="cyber-btn preset-btn control-btn" data-preset="1">PRESET 1</button>
      <button class="cyber-btn preset-btn control-btn" data-preset="2">PRESET 2</button>
      <button class="cyber-btn preset-btn control-btn" data-preset="3">PRESET 3</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
